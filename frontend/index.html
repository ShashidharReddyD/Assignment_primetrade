<!DOCTYPE html>
<html>
<head>
<title>Backend Assignment Demo</title>

<style>

body{
font-family: Arial;
margin:0;
background:#f4f6f8;
}

header{
background:#222;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
display:flex;
justify-content:center;
gap:20px;
padding:30px;
flex-wrap:wrap;
}

.card{
background:white;
padding:20px;
border-radius:8px;
width:320px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:8px;
margin-bottom:10px;
border:1px solid #ccc;
border-radius:4px;
}

button{
padding:8px 12px;
border:none;
background:#007bff;
color:white;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

.logout{
background:#dc3545;
}

.task{
background:#eef3ff;
padding:10px;
margin-top:10px;
border-radius:5px;
display:flex;
justify-content:space-between;
}

.delete{
background:#dc3545;
}

</style>
</head>

<body>

<header>

<h2>Backend Internship Assignment Demo</h2>

<button id="logoutBtn" class="logout" onclick="logout()" style="display:none">
Logout
</button>

</header>


<!-- AUTH SECTION -->

<div class="container" id="authSection">

<div class="card">

<h3>Register</h3>

<input id="rname" placeholder="Name">
<input id="remail" placeholder="Email">
<input id="rpassword" type="password" placeholder="Password">

<button onclick="register()">Register</button>

</div>


<div class="card">

<h3>Login</h3>

<input id="lemail" placeholder="Email">
<input id="lpassword" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

</div>



<!-- DASHBOARD -->

<div class="container" id="dashboard" style="display:none">

<div class="card">

<h3>Create Task</h3>

<input id="title" placeholder="Task title">
<input id="description" placeholder="Description">

<button onclick="createTask()">Create Task</button>
<button onclick="loadTasks()">Refresh Tasks</button>

<div id="taskList"></div>

</div>

</div>



<script>

let token = "";

/* SHOW DASHBOARD */

function showDashboard(){

document.getElementById("authSection").style.display="none";
document.getElementById("dashboard").style.display="flex";
document.getElementById("logoutBtn").style.display="block";

loadTasks();

}


/* LOGOUT */

function logout(){

token="";
localStorage.removeItem("token");

document.getElementById("dashboard").style.display="none";
document.getElementById("authSection").style.display="flex";
document.getElementById("logoutBtn").style.display="none";

alert("Logged out");

}


/* REGISTER */

async function register(){

const name=rname.value.trim();
const email=remail.value.trim();
const password=rpassword.value.trim();

if(!name||!email||!password){
alert("All fields required");
return;
}

const res=await fetch("http://localhost:5000/api/v1/auth/register",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({name,email,password})

});

const data=await res.json();

alert(data.message);

}



/* LOGIN */

async function login(){

const email=lemail.value.trim();
const password=lpassword.value.trim();

if(!email||!password){
alert("Enter email and password");
return;
}

const res=await fetch("http://localhost:5000/api/v1/auth/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({email,password})

});

const data=await res.json();

if(data.token){

token=data.token;

localStorage.setItem("token",token);

alert("Login successful");

showDashboard();

}
else{

alert(data.message);

}

}



/* CREATE TASK */

async function createTask(){

const title=document.getElementById("title").value.trim();
const description=document.getElementById("description").value.trim();

if(!title||!description){
alert("Title and description required");
return;
}

const res=await fetch("http://localhost:5000/api/v1/tasks",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+token
},

body:JSON.stringify({title,description})

});

const data=await res.json();

if(res.ok){

document.getElementById("title").value="";
document.getElementById("description").value="";

loadTasks();

}
else{

alert(data.message);

}

}



/* LOAD TASKS */

async function loadTasks(){

const res=await fetch("http://localhost:5000/api/v1/tasks",{

headers:{
"Authorization":"Bearer "+token
}

});

const tasks=await res.json();

const container=document.getElementById("taskList");

container.innerHTML="";

if(!Array.isArray(tasks) || tasks.length===0){

container.innerHTML="<p>No tasks found</p>";
return;

}

tasks.forEach(t=>{

const div=document.createElement("div");

div.className="task";

div.innerHTML=`
<span>${t.title}</span>
<button class="delete" onclick="deleteTask('${t._id}')">Delete</button>
`;

container.appendChild(div);

});

}



/* DELETE TASK */

async function deleteTask(id){

await fetch("http://localhost:5000/api/v1/tasks/"+id,{

method:"DELETE",

headers:{
"Authorization":"Bearer "+token
}

});

loadTasks();

}

</script>

</body>
</html>
